name: CI-common

on:
  workflow_call:
    secrets:
      CC_TEST_REPORTER_ID:
        required: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Run rubocop
        run: bundle exec rubocop

  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['3.3', '3.4']

    steps:
      # Selenium Manager, bundled with selenium-webdriver, resolves the matching
      # chromedriver itself, so only the browser needs installing here.
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: stable

      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run tests
        env:
          CHROME_BINARY: ${{ steps.setup-chrome.outputs.chrome-path }}
          SIMPLE_COV_JSON_FORMATTER: SIMPLE_COV_JSON_FORMATTER
        run: bundle exec rspec spec

      # Coverage is identical across the matrix, so it is published once only.
      - name: Test & publish code coverage
        if: matrix.ruby-version == '3.4'
        uses: paambaati/codeclimate-action@v9.0.0
        with:
          coverageLocations: |
            ${{github.workspace}}/coverage/coverage.json:simplecov
        env:
          CC_TEST_REPORTER_ID: ${{secrets.CC_TEST_REPORTER_ID}}

name: CI-common

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Run rubocop
        run: bundle exec rubocop

  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['3.3', '3.4']

    steps:
      # Selenium Manager, bundled with selenium-webdriver, resolves the matching
      # chromedriver itself, so only the browser needs installing here.
      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: stable

      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      # Coverage is measured and enforced by simplecov itself: see .simplecov,
      # which fails the run below 95%.
      - name: Run tests
        env:
          CHROME_BINARY: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: bundle exec rspec spec
